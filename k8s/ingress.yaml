apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: medical-system
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: medical.local
      http:
        paths:
          # Route specific backend auth endpoints to backend
          - path: /api/auth/login
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /api/auth/change-password
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Route all other NextAuth endpoints (e.g. /api/auth/error, session, callback) to frontend
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
          # Route all other /api requests directly to backend-service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Route Swagger UI / API docs to backend-service
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          # Route all other requests to frontend-service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
